body:
  text: 唐沙門慧海撰稽首和南十方諸佛諸大菩薩衆弟子今作此論恐不會聖心願賜懺悔若會聖理盡將回施一切有情願於來世盡得成佛問欲修何法即得解脫答唯有頓悟一門即得解脫云何為頓悟答頓者頓除妄念悟者悟無所得問從何而修答從根本修云何從根本修答心為根本云何知心為根本答楞伽經云心生即種種法生心滅即種種法滅維摩經云欲得淨土當淨其心隨其心淨即佛土淨遺教經云但制心一處無事不辦經云聖人求心不求佛愚人求佛不求心智人調心不調身愚人調身不調心佛名經云罪從心生還從心滅故知善惡一切皆由自心所以心為根本也若求解脫者先須識根本若不達此理虗費功勞於外相求無有是處禪門經云於外相求雖經劫數終不能成於內覺觀如一念頃即證菩提問夫修根本以何法修答惟坐禪禪定即得禪門經云求佛聖智要即禪定若無禪定念想喧動壞其善根問云何為禪云何為定答妄念不生為禪坐見本性為定本性者是汝無生心定者對境無心八風不能動八風者利衰毀譽稱譏苦樂是名八風若得如是定者雖是凡夫即入佛位何以故菩薩戒經云衆生受佛戒即入諸佛位得如是者即名解脫亦名達彼岸超六度越三界大力菩薩無量力尊是大丈夫問心住何處即住答住無住處即住問云何是無住處答不住一切處即是住無住處云何是不住一切處答不住一切處者不住善惡有無內外中間不住空亦不住不空不住定亦不住不定即是不住一切處只箇不住一切處即是住處也得如是者即名無住心也無住心者是佛心問其心似何物答其心不青不黃不赤不白不長不短不去不來非垢非淨不生不滅湛然常寂此是本心形相也亦是本身本身者即佛身也問身心以何為見是眼見耳見鼻見及身心等見答見無如許種見云既無如許種見復何見答是自性見何以故為自性本來清淨湛然空寂即於空寂體中能生此見問只如清淨體尚不可得此見從何而有答喻如明鑑中雖無像能見一切像何以故為明鑑無心故學人若心無所染妄心不生我所心滅自然清淨以清淨故能生此見法句經云於畢竟空中熾然建立是善知識也問涅槃經金剛身品不可見了了見無有知者無不知者云何答不可見者為自性體無形不可得故是名不可見也然見不可得者體寂湛然無有去來不離世流世流不能流坦然自在即是了了見也無有知者為自性無形本無分別是名無有知者無不知者於無分別體中具有恆沙之用若能分別一切即無事不知是名無不知者般若偈云般若無知無事不知般若無見無事不見問經云不見有無即真解脫何者是不見有無答證得淨心時即名有於中不生得淨心想即名不見有也得想無生無住不得作無生無住想即是不見無也故云不見有無也楞嚴經云知見立知即無明本知見無見斯即涅槃亦名解脫問云何是無所見答若見男子女人及一切色像於中不起愛憎與不見等即是無所見也問對一切色像時即名為見不對色像時亦名見否答見問對物時從有見不對物時云何有見答今言見者不論對物與不對物何以故為見性常故有物之時即見無物之時亦見也故知物自有去來見性無來去也諸彼亦耳問正見物時見中有物否答見中不立物問正見無物時見中有無物否答見中不立無物問有聲時即有聞無聲時還得聞否答亦聞問有聲時從有聞無聲時云何得聞答今言聞者不論有聲無聲何以故為聞性常故有聲時即聞無聲時亦聞問如是聞者是誰答是自性聞亦名知者聞問此頓悟門以何為宗以何為旨以何為體以何為用答無念為宗妄心不起為旨以清淨為體以智為用問既言無念為宗未審無念者無何念答無念者無邪念非無正念云何為邪念云何名正念答念有念無即名邪念不念有無即名正念念善念惡名為邪念不念善惡名為正念乃至苦樂生滅取捨怨親憎愛並名邪念不念苦樂等即名正念問云何是正念答正念者唯念菩提問菩提可得否答菩提不可得問既不可得云何唯念菩提答只如菩提假立名字實不可得亦無前後得者為不可得故即無有念只箇無念是名真念菩提無所念無所念者即一切處無心是無所念只如上說如許種無念者皆是隨事方便假立名字皆同一體無二無別但知一切處無心即是無念也得無念時自然解脫問云何行佛行答不行一切行即名佛行亦名正行亦名聖行如前所說不行有無憎愛等是也大律卷五菩薩品云一切聖人不行於衆生行衆生不行如是聖行問云何是正見答見無所見即名正見問云何名見無所見答見一切色時不起染著不染著者不起愛憎心即名見無所見也若得見無所見時即名佛眼更無別眼若見一切色時起愛憎者即名有所見有所見者即是衆生眼更無別眼作衆生眼乃至諸根亦復如是問既言以智為用者云何為智答知二性空即是解脫知二性不空不得解脫是名為智亦名了邪正亦名識體用二性空即是體知二性空即是解脫更不生疑即名為用言二性空者不生有無善惡愛憎名二性空問此門從何而入答從檀波羅蜜入問佛說六波羅蜜是菩薩行何故獨說檀波羅蜜云何具足而得入也答迷人不解五度皆因檀度生但修檀度即六度悉皆具足問何因緣故名為檀度答檀者名為布施問布施何物答布施却二性問云何是二性答布施却善惡性布施却有無性愛憎性空不空性定不定性淨不淨性一切悉皆施却即得二性空若得二性空時亦不得作二性空想亦不得作念有施想即是真行檀波羅蜜名萬緣俱絶萬緣俱絶者即一切法性空是也法性空者即一切處無心是若得一切處無心時即無有一相可得何以故為自性空故無一相可得無一相可得者即是實相實相者即是如來妙色身相也金剛經云離一切諸相則名諸佛問佛說六波羅蜜今云何說一即能具足願說一具六法之因答思益經云網明尊謂梵天言若菩薩捨一切煩惱名檀波羅蜜即是布施於諸法無所起名尸波羅蜜即是持戒於諸法無所傷名羼提波羅蜜即是忍辱於諸法離相名毗離耶波羅蜜即是精進於諸法無所住名禪波羅蜜即是禪定於諸法無戲論名般若波羅蜜即是智慧是名六法今更名六法不異一捨二無起三無念四離相五無住六無戲論如是六法隨事方便假立名字至於妙理無二無別但知一捨即一切捨無起即一切無起迷途不契悉謂有差愚者滯其法數之中即長輪生死告汝學人但修檀之法即萬法周圓況於五法豈不具耶問三學等用何者是三學云何是等用答三學者戒定慧是也問其義云何是戒定慧答清淨無染是戒知心不動對境寂然是定知心不動時不生不動想知心清淨時不生清淨想乃至善惡皆能分別於中無染得自在者是名為慧也若知戒定慧體俱不可得時即無分別者即同一體是名三學等用問若心住淨時不是著淨否答得住淨時不作住淨想是不著淨問心住空時不是著空否答若作空想即名著空問若心得住無住處時不是著無所處否答但作空想即無有著處汝若欲了了識無所住心時正坐之時但知心莫思量一切物一切善惡都莫思量過去事已過去而莫思量過去心自絶即名無過去事未來事未至莫願莫求未來心自絶即名無未來事現在事已現在於一切事但知無著無著者不起憎愛心即是無著現在心自絶即名無現在事三世不攝亦名無三世也心若起去時即莫隨去去心自絶若住時亦莫隨住住心自絶即無住心即是住無住處也若了了自知住在住時只物住亦無住處亦無無住處也若自了了知心不住一切處即名了了見本心也亦名了了見性也只箇不住一切處心者即是佛心亦名解脫心亦名菩提心亦名無生心亦名色性空經云證無生法忍是也汝若未得如是之時努力努力勤加用功功成自會所以會者一切處無心即是會言無心者無假不真也假者愛憎心是也真者無愛憎心是也但無憎愛心即是二性空二性空者自然解脫也問為只坐用行時亦得為用否答今言用功者不獨言坐乃至行住坐臥所造運為一切時中常用無間即名常住也問方廣經云五種法身一實相法身二功德法身三法性法身四應化法身五虗空法身於自己身何者是答知心不壞是實相法身知心含萬像是功德法身知心無心是法性法身隨根應說是應化法身知心無形不可得是虗空法身若了此義者即知無證也無得無證者即是證佛法法身若有證有得以為證者即邪見增上慢人也名為外道何以故維摩經云舍利弗問天女曰汝何所得何所證辨乃得如是天女答曰我無得無證乃得如是若有得有證即於佛法中為增上慢人也問經云等覺妙覺云何是等覺云何是妙覺答即色即空名為等覺二性空故名為妙覺又云無覺無無覺名為妙覺也問等覺與妙覺為別為不別答為隨事方便假立二名本體是一無二無別乃至一切法皆然也問金剛云無法可說是名說法其義云何答般若體畢竟清淨無有一物可得是名無法可說即於般若空寂體中具恆沙之用即無事不知是名說法故云無法可說是名說法問若有善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業即為消滅當得阿耨多羅三藐三菩提其義云何答只如有人未遇大善知識唯造惡業清淨本心被三毒無明所覆不能顯了故云為人輕賤也以今世人輕賤者即是今日發心求佛道為無明滅盡三毒不生即本心明朗更無亂念諸惡永滅故以今世人輕賤也無明滅盡亂念不生自然解脫故云當得菩提即發心時名為今世非隔生也又云如來五眼者何答見色清淨名為肉眼見體清淨名為天眼於諸色境乃至善惡悉能微細分別無所染著於中自在名為慧眼見無所見名為法眼無見無無見名為佛眼又云大乘最上乘其義云何答大乘者是菩薩乘最上乘者是佛乘又問云何修而得此乘答修菩薩乘者即是大乘證菩薩乘更不起觀至無修處湛然常寂不增不減名最上乘即是佛乘也問涅槃云定多慧少不離無明定少慧多增長邪見定慧等故即名解脫其義如何答對一切善惡悉能分別是慧於所分別之處不起愛憎不隨所染是定即是定慧等用也又問無言無說即名為定正言說之時得名定否答今言定者不論說與不說常定何以故為用定性言說分別時即言說分別亦定若以空心觀色時即觀色時亦空若不觀色不說不分別時亦空乃至見聞覺知亦復如是何以故為自性空即於一切處悉空空即無著無著即是等用為菩薩常用如是等空之法得至究竟故云定慧等者即名解脫也今更為汝譬喻顯示令汝惺惺得解斷疑譬如明鑑照像之時其明動否不也不照時亦動否不也何以故為明鑑用無情明照所以照時不動不照亦不動何以故為無情之中無有動者亦無不動者又如日光照世之時其光動否不也若不照時動否不也何以故為光無情故用無情光照所以不動不照亦不動照者是慧不動者是定菩薩用是定慧等法得三菩提故云定慧等用即是解脫也今言無情者無凡情非無聖情也問云何是凡情云何是聖情答若起二性即是凡情二性空故即是聖情問經云言語道斷心行處滅其義如何答以言顯義得義言絶義即是空空即是道道即是絶言故云言語道斷心行處滅謂得義實際更不起觀不起觀故即是無生以無生故即一切色性空色性空故即萬緣俱絶萬緣俱絶者即是心行處滅問如如者云何答如如是不動義心真如故名如如也是知過去諸佛行此行亦得成道現在佛行此行亦得成道未來佛行此行亦得成道三世所修證道無異故名如如也維摩經云諸佛亦如也至於彌勒亦如也乃至一切衆生悉皆如也何以故為佛性不斷有性故也問即色即空即凡即聖是頓悟否答是問云何是即色即空云何是即凡即聖答心有染即色心無染即空心有染即凡心無染即聖又云真空妙有故即色色不可得故即空今言空者是色性自空非色滅空今言色者是空性自色非色能色也問經云盡無盡法門如何答為二性空故見聞無生是盡盡者諸漏盡無盡者於無生體中具恆沙妙用隨事應現悉皆具足於本體中亦無損減是名無盡即是盡無盡法門也問盡與無盡為一為別答體是一說即有別問體既是一云何說別答一者是說之體說是體之用為隨事應用故云體同說別喻如天上一日下置種種盆器盛水一一器中皆有於日諸器中日悉皆圓滿與天上日亦無差別故云體同為隨器立名即有差別所以有別故云體同說即有別所現諸日悉皆圓滿於上本日亦無損滅故云無盡也問經云不生不滅何法不生何法不滅答不善不生善法不滅問何者善何者不善答不善者是染漏心善法者是無染漏心但無染無漏即是不善不生得無染無漏時即清淨圓明湛然常寂畢竟不遷是名善法不滅也此即是不生不滅問菩薩戒云衆生受佛戒即入諸佛位位同大覺已真是諸佛子其義云何答佛戒者清淨心是也若有人發心修行清淨行得無所受心者名受佛戒也過去諸佛皆修清淨無受行得成佛道今有時人發心修無受清淨行者即與佛功德等用無有異也故云入諸佛位也如是悟者與佛悟同故云位同大覺已真是諸佛子從清淨心生智智清淨名為諸佛子亦名此佛子問只是佛之與法為是佛在先為是法在先若法在先法是何佛所說若佛在先承何教而成道答佛亦在法先亦在法後問因何佛法先後答若據寂滅法是法先佛後若據文字法是佛先法後何以故一切諸佛皆因寂滅法而得成佛即是法先佛後經云諸佛所師所為法也得成道已然始廣說十二部經引化衆生衆生承佛法教修行得成佛即是法先佛後也問云何是說通宗不通答言行相違即是說通宗不通問云何是宗通說亦通答言行無差即是說通宗亦通問經云到不到不到到之法云何答說到行不到名為到不到行到說不到名為不到到行說俱到名為到到問佛法不盡有為不住無為何者是不盡有為何者是不住無為答不盡有為者從初發心至菩提樹下成等正覺後至雙林入般涅槃於中一切法悉皆不捨即是不盡有為也不住無為者雖修無念不以無念為證雖修空不以空為證雖修菩提涅槃無相無作不以無相無作為證即是不住無為也問為有地獄為無地獄答亦有亦無問云何亦有亦無答為隨心所造一切惡業即有地獄若心無染自性空故即無地獄問受罪衆生有佛性否答亦同佛性問既有佛性正入地獄時佛性同入否答不同入問正入之時佛性復在何處答亦同入問既同入正入時衆生受罪佛性亦同受罪否答佛性雖隨衆生同入是衆生自受罪苦佛性元來不受問既同入因何不受答衆生者是有相有相者即有成壞佛性者是無相無相者即是空性也是故真空之性無有壞者喻如有人於空積薪薪自受壞空不受壞也空喻佛性薪喻衆生故云同入而不同受也問轉八識成四智束四智成三身幾箇識共成一智幾箇識獨成一智答眼耳鼻舌身此五識共成成所作智第六是意獨成妙觀察智第七心識獨成平等性智第八含藏識獨成大圓鏡智問此四智為別為同答體同名別問體既同云何名別既隨事立名正一體之時何者是大圓鏡智答湛然空寂圓明不動即大圓鏡智能對諸塵不起愛憎即是二性空二性空即平等性智能入諸根境界善能分別不起亂想而得自在即是妙觀察智能令諸根隨事應用悉入正受無二相者即是成所作智問束四智成三身者幾箇智共成一身幾箇智獨成一身答大圓鏡智獨成法身平等性智獨成報身妙觀察智與成所作智共成化身此三身亦假立名字分別只令未解者看若了此理亦無三身應用何以故為體性無相從無住本而立亦無無住本問云何是見佛真身答不見有無即是見佛真身問云何不見有無即是見佛真身答有因無立無因有顯本不立有無亦不存既不存無有從何得有之與無相因始有既相因而有悉是生滅也但離此二見即是見佛真身問只如有無尚不可交建立真身復從何而立答為有問故若無問時真身之名亦不可立何以故譬如明鏡若對物像時即現像若不對像時終不見像問云何是常不離佛答心無起滅對境寂然一切時中畢竟空寂即是常不離佛問何者是無為法答有為是問今問無為法因何答有為是答有因無立無因有顯本不立有無從何生若論真無為者即不取有為亦不取無為是真無為法也何以故經云若取法相即著我人若取非法相即著我人是故不應取法不應取非法即是取真法也若了此理即真解脫即會不二法門問何者是中道義答邊義是問今問中道因何答邊義是答邊因中立中因邊生本若無邊中從何有今言中者因邊始有故知中之與邊相因而立悉是無常色受想行識亦復如是問何名五陰等答對色染色隨色受生名為色陰為領納入八風好集邪信即隨領受中生名為受陰迷心取想隨想受生名為想陰結集諸行隨行受生名為行陰於平等體妄起分別繫著虗識受生名為識陰故云五陰問經云二十五有何者是答受後有身是也後有身者即六道受生也為衆生現世心迷好結諸業後即隨業受生故云後有也世若有人志修究竟解脫證無生法忍者即永離三界不受後有不受後有者即證法身法身者即是佛身問二十五有名云何分別答本體是一為隨用立名顯二十五有二十五有十惡十善五陰是問云何是十惡十善答十惡煞盜淫妄言綺語兩舌惡口乃至貪瞋邪見此名十惡十善者但不行十惡即是也問上說無念由未盡決答無念者一切處無心是無一切境界無餘思求是對諸境色永無起動是即無念無念者是名真念也若以念為念者即是邪念非為正念何以故經云若教人六念名為非念有六念名為邪念無六念者即真念經云善男子我等住於無念法中得如是金色三十二相放大光明照無餘世界不可思議功德佛說之猶不盡何況餘乘能知也得無念者六根無染故自然得入諸佛知見得如是者即名佛藏亦名法藏即能一切佛一切法何以故為無念故經云一切諸佛等皆從此經出問既稱無念入佛知見復從何立答從無念立何以故經云從無住本立一切法又云喻如明鑑鑑中雖無像而能現萬像何以故為鑑明故能現萬像學人為心無染故妄念不生我人心滅畢竟清淨以清淨故能生無量知見頓悟者不離此生即得解脫何以知之譬如師子兒初生之時即真師子修頓悟者亦復如是即修之時即入佛位如竹春生筍不離於春即與母齊等無有異何以故為心空故修頓悟者亦復如是為頓除妄念永絶我人畢竟空寂即與佛齊等無有異故云即凡即聖也修頓悟者不離此身即超三界經云不壞世間而超世間不捨煩惱而入涅槃不修頓悟者猶如野干隨逐師子經百千劫終不得成師子又問真如之性為實空為實不空若言不空即是有相若言空者即是斷滅一切衆生當依何修而得解脫答真如之性亦空亦不空何以故真如妙體無形無相不可得也是名亦空然於空無相體中具足恆沙之用即無事不應是名亦不空經云解一即千從迷一即萬惑若人守一萬事畢是悟道之妙也經云森羅及萬像一法之所印云何一法中而生種種見如此功業由行為本若不降心依文取證無有是處自誑誑他彼此俱墜努力努力細細審之只是事來不受一切處無心得如是者即入涅槃證無生法忍亦名不二法門亦名無諍亦名一行三昧何以故畢竟清淨無我人故不起愛憎是二性空是無所見即是真如無得之辨此論不傳無信唯傳同見同行當觀前人有誠信心堪任不退者如是之人乃可為說示之令悟吾作此論為有緣人非求名利只如諸佛所說千經萬論只為衆生迷故心行不同隨邪應說即有差別如論究竟解脫理者只是事來不受一切處無心永寂如空畢竟清淨自然解脫汝莫求虗名口說真如心似猿猴即言行相違名為自誑當墮惡道莫求一世虗名快樂不覺長劫受殃努力努力衆生自度佛不能度若佛能度衆生時過去諸佛如微塵數一切衆生總應度盡何故我等至今流浪生死不得成佛當知衆生自度佛不能度努力努力自修莫倚他佛力經云夫求法者不著佛求問於來世中多有雜學之徒云何共住答但和其光不同其業同處不同位經云隨流而性常也只如學道者自為大事因緣解脫之事俱勿輕未學敬學如佛不高己德不疾彼能自察於行不舉他過於一切處悉無妨礙自然快樂也重說偈云忍辱第一道先須除我人事來無所受即真菩提身金剛經云菩薩無我法者如來說名真是菩薩又云不取即不捨永斷於生死一切處無心即名諸佛子涅槃經云如來證涅槃永斷於生死偈曰我今意況大好他人罵時無惱無言不說是非涅槃生死同道識達自家本宗猶來無有青皂一切妄想分別將知世人不了寄言凡夫末代除却心中藁草我今意況大寬不語無事心安從容自在解脫東西去易不難終日無言寂寞念念向理思看自然逍遙見道生死定不相干我今意況大奇不向世上侵欺榮華總是虗誑弊衣粗食充飢道逢世人懶語世人咸說我癡外現瞪瞪暗鈍心中明若琉璃默契羅睺密行非汝凡夫所知吾恐汝等不會了真解脫理再示汝等問維摩經云欲得淨土當淨其心云何是淨心答以畢竟淨為淨問云何是畢竟淨為淨答無淨無無淨即是畢竟淨問云何是無淨無無淨答一切處無心是淨得淨之時不得作淨想即名無淨也得無淨時亦不得作無淨想即是無無淨也問修道者以何為證答畢竟證為證問云何是畢竟證答無證無無證是名畢竟證問云何是無證云何是無無證答於外不染色聲等於內不起妄念心得如是者即名為證得證之時不得作證想即名無證也得此無證之時亦不得作無證想是名無證即名無無證也問云何解脫心答無解脫心亦無無解脫心即名真解脫也經云法尚應捨何況非法也法者是有非法是無也但不取有無即真解脫問云何得道答以畢竟得為得問云何是畢竟得答無得無無得是名畢竟得問云何是畢竟空答無空無無空即名畢竟空問云何是真如定答無定無無定即名真如定經云無有定法名阿耨多羅三藐三菩提亦無定法如來可說經云雖修空不以空為證不得作空想即是也雖修定不以定為證不得作定想即是也雖得淨不以淨為證不得作淨想即是也若得定得淨得一切處無心之時即作得如是想者皆是妄想即被繫縛不名解脫若得如是之時了了自知得自在即不得將此為證亦不得作如是想時得解脫經云若起精進心是妄非精進也若能心不妄精進無有涯問云何是中道答無中間亦無二邊即中道也云何是二邊答為有彼心有此心即是二邊云何名彼心此心答外縛色聲名為彼心內起妄念名為此心若於外不染色即名無彼心內不生妄念即名無此心此非二邊也心既無二邊中亦何有哉得如是者即名中道真如來道如來道者即一切覺人解脫也經云虗空無中邊諸佛身亦然然一切色空者即一切處無心也一切處無心者即一切色性空二義無別亦名色空亦名色無法也汝若離一切處無心得菩提解脫涅槃寂滅禪定見性者非也一切處無心者即修菩提解脫涅槃寂滅禪定乃至六度皆見性處何以故金剛經云無有少法可得是名阿耨多羅三藐三菩提也問若有修一切諸行具足成就得受記否答不得問若以一切法無修得成就得受記否答不得問若恁麼時當以何法而得受記答不以有行亦不以無行即得受記何以故維摩經云諸行性相悉皆無常涅槃經云佛告迦葉諸行是常無有是處汝但一切處無心即無諸行亦無無行即名受記所言一切處無心者無憎愛心是言憎愛者見好事不起愛心即名無愛心也見惡事亦不起憎心即名無憎心也無愛者即名無染心即是色性空也色性空者即是萬緣俱絶萬緣俱絶者自然解脫汝細看之若未惺惺了時即須早問勿使空度汝等若依此教修不解脫者吾即終身為汝受大地獄吾若誑汝者吾當所生處為師子虎狼所食汝若不依教自不勤修即不知也一失人身萬劫不復努力努力須合知爾吳江居士吳瑞徵施資刻此頓悟入道要門論上卷資先考霽宇府君冥福了緣居士對長洲徐普書溧水端學堯刻萬曆丁酉夏六月徑山興聖萬壽禪寺識
