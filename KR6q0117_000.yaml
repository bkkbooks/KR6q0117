body:
  text: 頓悟入道要門論原序夫善知識者如巨海舟航能度迷類長夜明炬善破羣昏大珠和尚首參馬祖使入慧海之法界令開寶藏於自家所以靈辨滔滔譬大川之流水峻機疊疊如圓器之傾珠於是曲設多方垂慈利物發揚至道烏可以筆舌讚歎哉妙叶維那四明翠山大中理公之神足夙具靈根素培智種禪餘之暇閲此老語録有所證入平生礙膺之物脫然而去從上佛祖舌頭一無所疑矣此亦古塔主覩雲門語而嗣之正所謂也故捐資鏤板以廣其傳期以後之來者同一了悟存此心者豈淺淺耶此之功勳不墜行願彌堅蓋可見矣所幾法流不泯派永接於曹溪燈焰長存光愈明於少室也時歲在癸丑春孟十日阿育王山沙門釋崇裕書於無異堂
